<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin-Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <h1 id="heading">Calculator</h1>
    </div>

    <div id="main">
        <div id="calculator-container">
            <input type="text" id="display" readonly>
            <div id="buttons-container">
                <button class="buttons operator" id="clear-btn">C</button>
                <button class="buttons operator" id="brackets">()</button>
                <button onclick="appendToDisplay('%')"class="buttons operator" id="percentage">%</button>
                <button onclick="appendToDisplay('/')"class="buttons operator" id="division">/</button>
                <button onclick="appendToDisplay('7')"class="buttons">7</button>
                <button onclick="appendToDisplay('8')"class="buttons">8</button>
                <button onclick="appendToDisplay('9')"class="buttons">9</button>
                <button onclick="appendToDisplay('x')"class="buttons operator" id="multiplication">x</button>
                <button onclick="appendToDisplay('4')"class="buttons">4</button>
                <button onclick="appendToDisplay('5')"class="buttons">5</button>
                <button onclick="appendToDisplay('6')"class="buttons">6</button>
                <button onclick="appendToDisplay('-')"class="buttons operator" id="subtraction">-</button>
                <button onclick="appendToDisplay('1')"class="buttons">1</button>
                <button onclick="appendToDisplay('2')"class="buttons">2</button>
                <button onclick="appendToDisplay('3')"class="buttons">3</button>
                <button onclick="appendToDisplay('+')"class="buttons operator" id="addition">+</button>
                <button onclick="appendToDisplay('0')"class="buttons">0</button>
                <button onclick="appendToDisplay('.')"class="buttons" id="point">.</button>
                <button class="buttons" id="delete">Del</button>
                <button class="buttons operator" id="equals">=</button>
            </div>
        </div>
    </div>
        


    <div id="footer">
        <p class="copyright">Copyright © <script>document.write(new Date().getFullYear())</script> Kgodisho Mononyane</p>
        <p><a href="https://github.com/Kgodisho-Mononyane/calculator-odin" target="_blank" class="link">Github</a></p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
