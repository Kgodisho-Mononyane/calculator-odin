<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin-Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <h1 id="heading">Calculator</h1>
    </div>

    <div id="main">
        <div id="calculator-container">
            <input type="text" readonly>
            <div id="buttons-container">
                <button class="buttons operator">C</button>
                <button class="buttons operator">()</button>
                <button class="buttons operator">%</button>
                <button class="buttons operator">/</button>
                <button class="buttons">7</button>
                <button class="buttons">8</button>
                <button class="buttons">9</button>
                <button class="buttons operator">x</button>
                <button class="buttons">4</button>
                <button class="buttons">5</button>
                <button class="buttons">6</button>
                <button class="buttons operator">-</button>
                <button class="buttons">1</button>
                <button class="buttons">2</button>
                <button class="buttons">3</button>
                <button class="buttons operator">+</button>
                <button class="buttons">0</button>
                <button class="buttons">.</button>
                <button class="buttons">Del</button>
                <button class="buttons operator">=</button>
            </div>
        </div>
    </div>
        


    <div id="footer">
        <p class="copyright">Copyright © <script>document.write(new Date().getFullYear())</script> Kgodisho Mononyane</p>
        <p><a href="https://github.com/Kgodisho-Mononyane/calculator-odin" target="_blank" class="link">Github</a></p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
